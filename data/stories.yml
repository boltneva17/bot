version: "3.1"

stories:

  - story: screening — role recognized (any role)
    steps:
      - intent: start_screening
      - action: action_set_role
      - slot_was_set:
          - role: {"not_null": true}
      - action: utter_ask_experience

  - story: greet then screening
    steps:
      - intent: greet
      - action: utter_greet
      - intent: start_screening
      - action: action_set_role
      - slot_was_set:
          - role: {"not_null": true}
      - action: utter_ask_experience

  - story: ask capabilities then screening
    steps:
      - intent: ask_capabilities
      - action: utter_capabilities
      - intent: start_screening
      - action: action_set_role
      - slot_was_set:
          - role: {"not_null": true}
      - action: utter_ask_experience

  - story: screening — retry invalid role
    steps:
      - intent: start_screening
      - action: action_set_role
      - slot_was_set:
          - role: null
      - intent: start_screening
      - action: action_set_role
      - slot_was_set:
          - role: {"not_null": true}
      - action: utter_ask_experience
