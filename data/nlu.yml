version: "3.1"

nlu:
- regex: experience_years
  examples: |
    - \b\d{1,2}(?:[\.,]\d)?\s*(?:\+)?\s*(?:год|года|лет|г\.)\b
    - \b\d{1,2}\s*(?:мес|месяц|месяца|месяцев|мес\.)\b
    - \bпол\s?года\b
    - \bоколо\s+\d{1,2}\s+лет\b
    - \bболее\s+\d{1,2}\s+лет\b

- regex: salary_expectation
  examples: |
    - \b\d{1,3}(?:\s?\d{1,3})?\s?(?:k|к|тыс|тысяч)\b
    - \b\d{1,3}(?:\s?\d{1,3})?\s?(?:₽|руб|рублей|р\.)?\b
    - \b\d(?:[\.,]\d)?\s?(?:млн|million)\b
    - \b\d{1,3}(?:\s?\d{1,3})?\s?(?:-|–|—)\s?\d{1,3}(?:\s?\d{1,3})?\s?(?:k|к|тыс|тысяч)\b
    - \b(?:от|до|около|более|менее)\s+\d{1,3}(?:\.\d{1,3})?\s*(?:тыс|к|руб)\b


