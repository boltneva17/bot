version: "3.1"


rules:

- rule: greet
  steps:
    - intent: greet
    - action: utter_greet

- rule: goodbye
  steps:
    - intent: goodbye
    - action: utter_goodbye

- rule: bot
  steps:
    - intent: bot_challenge
    - action: utter_iamabot

- rule: fallback
  steps:
    - intent: nlu_fallback
    - action: utter_default

- rule: restart
  steps:
    - intent: restart
    - action: action_restart
