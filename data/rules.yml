version: "3.1"

rules:

  # Базовые правила общения
  - rule: Приветствие
    steps:
      - intent: greet
      - action: utter_greet

  - rule: Прощание
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Вопрос — бот или человек
    steps:
      - intent: bot_challenge
      - action: utter_iamabot

  - rule: Что умеешь делать
    steps:
      - intent: ask_capabilities
      - action: utter_capabilities

  - rule: Какие роли доступны
    steps:
      - intent: ask_available_roles
      - action: utter_available_roles

  - rule: Вне области интервью
    steps:
      - intent: out_of_scope
      - action: utter_default

  - rule: Рестарт диалога
    steps:
      - intent: restart
      - action: action_restart

  - rule: Fallback при низкой уверенности
    steps:
      - intent: nlu_fallback
      - action: utter_default

  # Запуск формы скрининга
  - rule: Активация формы по intent start_screening
    steps:
      - intent: start_screening
      - action: screening_form
      - active_loop: screening_form

  - rule: Активация формы по intent inform_role
    steps:
      - intent: inform_role
      - action: screening_form
      - active_loop: screening_form

  # Завершение формы и оценка кандидата
  - rule: Отправка формы и оценка
    condition:
      - active_loop: screening_form
    steps:
      - action: screening_form
      - active_loop: null
      - slot_was_set:
          - requested_slot: null
      - action: utter_summary
      - action: action_evaluate_candidate

  # Быстрый трек — все данные одним сообщением
  - rule: Быстрый трек с полным профилем
    steps:
      - intent: provide_full_profile
      - action: utter_summary
      - action: action_evaluate_candidate
