version: '3.1'
intents:
- ask_available_roles
- ask_capabilities
- bot_challenge
- goodbye
- greet
- inform_experience_years
- inform_salary_expectation
- inform_skills
- inform_work_format
- out_of_scope
- request_skills_menu
- restart
- start_screening
entities:
- work_format
- experience_years
- role
- salary_expectation
- skills
slots:
  role:
    type: text
    influence_conversation: true
    mappings:
    - type: from_entity
      entity: role
  evaluation_result:
    type: text
    influence_conversation: false
    mappings:
    - type: custom
  experience_years:
    type: text
    influence_conversation: false
    mappings:
    - type: from_text
      intent: inform_experience_years
  skills:
    type: list
    influence_conversation: false
    mappings:
    - type: from_text
      intent: inform_skills
  salary_expectation:
    type: text
    influence_conversation: false
    mappings:
    - type: from_text
      intent: inform_salary_expectation
  work_format:
    type: text
    influence_conversation: false
    mappings:
    - type: from_text
      intent: inform_work_format
responses:
  utter_greet:
  - text: Привет! 👋 Я HR-бот. Провожу отбор на IT-позиции. На какую роль претендуете?
  utter_ask_experience:
  - text: Какой у вас опыт работы в годах?
  utter_ask_salary:
  - text: Какие у вас зарплатные ожидания?
  utter_ask_format:
  - text: Какой формат работы удобен (удаленка, офис, гибрид)?
  utter_goodbye:
  - text: До свидания! Мы свяжемся с вами.
  utter_iamabot:
  - text: Я — искусственный интеллект, помогающий HR-команде.
  utter_available_roles:
  - text: 'У нас открыты: Data Scientist, Data Engineer, Data Analyst, Project Manager, MLOps.'
  utter_capabilities:
  - text: Я могу провести первичное интервью и оценить твой профиль.
  utter_skills_menu:
  - text: 'Вот популярные навыки: Python, SQL, Docker, Spark. Что из этого умеете?'
  utter_default:
  - text: Извините, я не совсем понял. Давайте вернемся к интервью?
actions:
- action_set_role
- action_process_experience
- action_process_salary
- action_evaluate_candidate
- action_ask_skills
- action_summary
- action_restart
session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
